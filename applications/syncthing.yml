name: Syncthing
vendor: syncthing
platforms:
- windows
- macos
- linux

update_source:
  type: github_releases
  owner: syncthing
  repo: syncthing
  include_prereleases: false
  tag_pattern: ^v\d+\.\d+\.\d+$

versioning:
  scheme: semver
  strip_prefix: v

metadata:
  homepage: https://syncthing.net/
  release_notes: https://github.com/syncthing/syncthing/releases

release:
  latest_version: v2.0.15
  released_on: 2026-03-03
  breaking: false
  security: true
  notes_url: https://github.com/syncthing/syncthing/releases/tag/v2.0.15
