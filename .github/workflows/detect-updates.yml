name: Detect app updates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: app-version-detection
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth setup-git


      - name: Debug env
        run: |
          echo "Actor: $GITHUB_ACTOR"
          echo "Default branch (gh): $(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name' || echo main)"
          gh auth status || true
          git remote -v


      - name: Detect updates and open per-app PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional customization:
          DEFAULT_BASE_BRANCH: main
        run: python scripts/detect_and_pr.py
