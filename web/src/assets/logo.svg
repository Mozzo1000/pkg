<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- PKG logo: isometric package/box mark with an "update available" chevron badge, plus the PKG wordmark -->
<svg
   width="224"
   height="90"
   viewBox="0 0 224 90"
   version="1.1"
   id="svg5"
   xmlns="http://www.w3.org/2000/svg">
  <g
     id="mark"
     fill="none"
     stroke="currentColor"
     stroke-width="5"
     stroke-linejoin="round"
     stroke-linecap="round">
    <!-- isometric cube = package -->
    <path
       id="cube-outline"
       d="M 50,20 L 74.25,34 L 74.25,62 L 50,76 L 25.75,62 L 25.75,34 Z" />
    <path
       id="cube-edges"
       d="M 50,48 L 50,20 M 50,48 L 74.25,62 M 50,48 L 25.75,62" />
    <!-- update-available chevron -->
    <path
       id="badge-chevron"
       d="M 78,24 L 84,18 L 90,24" />
  </g>
  <text
     id="wordmark"
     x="112"
     y="68"
     fill="currentColor"
     style="font-family:'Roboto Mono', monospace; font-weight:700; font-size:56px; letter-spacing:1px">PKG</text>
</svg>
